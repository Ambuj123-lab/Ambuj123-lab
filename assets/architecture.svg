  <text x="755" y="544" class="node-sub">grounded ✓ · hallucinated ✗</text>
</g>

<!-- Node 8: PostProcess -->
<g>
  <rect class="glass-box node-anim" x="690" y="610" width="190" height="60" rx="14" stroke="#00f2fe"/>
