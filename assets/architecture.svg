<rect x="50" y="245" width="1000" height="400" rx="16" fill="url(#sectionGrad)" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="6,4"/>
<text x="75" y="270" class="section-label" fill="rgba(255,255,255,0.3)">8-NODE AGENTIC RAG PIPELINE</text>

