  <text x="758" y="637" class="node-num" fill="#00f2fe">NODE 8</text>
  <text x="758" y="653" class="node-title" fill="#00f2fe">PostProcess</text>
</g>

<!-- Branch lines (kept unchanged) -->
<path class="flow-line flow-red" d="M270,315 L390,315"/>
<circle r="3" fill="#ff4d6a" class="particle"><animateMotion dur="2s" repeatCount="indefinite" path="M270,315 L390,315"/></circle>
<path class="flow-line flow-green" d="M270,335 L390,370"/>
<circle r="3" fill="#10ffa0" class="particle"><animateMotion dur="2s" repeatCount="indefinite" path="M270,335 L390,370"/></circle>
<path class="flow-line flow-orange" d="M270,355 L390,430"/>
<circle r="3" fill="#ff6b35" class="particle"><animateMotion dur="2s" repeatCount="indefinite" path="M270,355 L390,430"/></circle>
<path class="flow-line flow-cyan" d="M175,370 L175,485"/>
<circle r="4" fill="#00e5ff" class="particle"><animateMotion dur="2s" repeatCount="indefinite" path="M175,370 L175,485"/></circle>
<path class="flow-line flow-cyan" d="M270,520 L380,520"/>
<circle r="4" fill="#00e5ff" class="particle"><animateMotion dur="1.5s" repeatCount="indefinite" path="M270,520 L380,520"/></circle>
<path class="flow-line flow-amber" d="M570,520 L680,520"/>
<circle r="4" fill="#fbbf24" class="particle"><animateMotion dur="1.5s" repeatCount="indefinite" path="M570,520 L680,520"/></circle>
<path class="flow-line flow-violet" d="M780,555 L780,610"/>
<circle r="4" fill="#a78bfa" class="particle"><animateMotion dur="1.5s" repeatCount="indefinite" path="M780,555 L780,610"/></circle>

<path class="flow-line flow-red" d="M550,318 L600,318"/>
<path class="flow-line flow-green" d="M550,378 L600,378"/>
<path class="flow-line flow-orange" d="M590,443 L640,443"/>

<!-- ═══ SECTION 3: INFRASTRUCTURE ═══ -->
<rect x="50" y="695" width="1000" height="170" rx="16" fill="url(#sectionGrad)" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="6,4"/>
<text x="75" y="720" class="section-label" fill="rgba(167,139,250,0.3)">INFRASTRUCTURE</text>

<!-- Pinecone -->
<g>
