<svg viewBox="0 0 960 580" xmlns="http://www.w3.org/2000/svg" width="960" height="580">
<defs>
  <style>
    @keyframes dash { to { stroke-dashoffset: -24; } }
    @keyframes pulse { 0%,100%{opacity:.35} 50%{opacity:1} }
    @keyframes glow  { 0%,100%{filter:drop-shadow(0 0 3px #00e5ff)} 50%{filter:drop-shadow(0 0 10px #00e5ff)} }
    @keyframes glowG { 0%,100%{filter:drop-shadow(0 0 3px #10ffa0)} 50%{filter:drop-shadow(0 0 10px #10ffa0)} }
    @keyframes glowR { 0%,100%{filter:drop-shadow(0 0 3px #ff4d6a)} 50%{filter:drop-shadow(0 0 10px #ff4d6a)} }
    @keyframes glowA { 0%,100%{filter:drop-shadow(0 0 3px #fbbf24)} 50%{filter:drop-shadow(0 0 10px #fbbf24)} }
    @keyframes glowV { 0%,100%{filter:drop-shadow(0 0 3px #a78bfa)} 50%{filter:drop-shadow(0 0 10px #a78bfa)} }
    @keyframes scanline { 0%{transform:translateY(-580px)} 100%{transform:translateY(580px)} }

    .flow-cy { stroke:#00e5ff; stroke-width:1.5; fill:none; stroke-dasharray:6,4; animation:dash 1.2s linear infinite; }
    .flow-gr { stroke:#10ffa0; stroke-width:1.5; fill:none; stroke-dasharray:6,4; animation:dash 1.4s linear infinite; }
    .flow-re { stroke:#ff4d6a; stroke-width:1.5; fill:none; stroke-dasharray:6,4; animation:dash 1.6s linear infinite; }
    .flow-am { stroke:#fbbf24; stroke-width:1.5; fill:none; stroke-dasharray:6,4; animation:dash 1.3s linear infinite; }
    .flow-vi { stroke:#a78bfa; stroke-width:1.5; fill:none; stroke-dasharray:6,4; animation:dash 1.5s linear infinite; }
    .flow-cy2{ stroke:rgba(0,229,255,.3); stroke-width:1; fill:none; stroke-dasharray:4,6; animation:dash 2s linear infinite; }

    .nc { animation:glow  2.5s ease-in-out infinite; }
    .ng { animation:glowG 2.8s ease-in-out infinite; }
    .nr { animation:glowR 3.0s ease-in-out infinite; }
    .na { animation:glowA 2.6s ease-in-out infinite; }
    .nv { animation:glowV 3.2s ease-in-out infinite; }

    text { font-family:'Courier New',Courier,monospace; }
    .lm  { font-size:10px; font-weight:bold; fill:#f0f6fc; }
    .ls  { font-size:8px;  fill:#8b949e; }
    .lc  { font-size:9px;  fill:#00e5ff; font-weight:bold; }
    .lg_ { font-size:9px;  fill:#10ffa0; font-weight:bold; }
    .lr  { font-size:9px;  fill:#ff4d6a; font-weight:bold; }
    .la  { font-size:9px;  fill:#fbbf24; font-weight:bold; }
    .lv  { font-size:9px;  fill:#a78bfa; font-weight:bold; }
    .lx  { font-size:7.5px;fill:#4b5563; }
  </style>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M40 0L0 0 0 40" fill="none" stroke="rgba(0,229,255,.04)" stroke-width=".5"/>
  </pattern>
  <marker id="ac" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#00e5ff"/></marker>
  <marker id="ag" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#10ffa0"/></marker>
  <marker id="ar" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#ff4d6a"/></marker>
  <marker id="aa" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#fbbf24"/></marker>
  <marker id="av" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#a78bfa"/></marker>
</defs>

<!-- BG -->
<rect width="960" height="580" fill="#0d1117"/>
